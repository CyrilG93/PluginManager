<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyril Plugin Manager</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Navigation">
        <button class="icon-button active" type="button" title="Produits" aria-label="Produits">⌘</button>
        <button class="icon-button" type="button" title="Actualiser" aria-label="Actualiser" id="refreshAllButton">↻</button>
        <button class="icon-button admin-button" type="button" title="Admin" aria-label="Admin" id="adminButton">A</button>
      </aside>

      <section class="product-pane" aria-label="Produits">
        <header class="topbar">
          <div class="tabs" role="tablist" aria-label="Filtres">
            <button class="tab active" data-filter="all" type="button">All Products</button>
            <button class="tab" data-filter="script" type="button">Auto</button>
            <button class="tab" data-filter="manual" type="button">Manual</button>
          </div>
        </header>

        <label class="search-box">
          <span>⌕</span>
          <input id="searchInput" type="search" placeholder="Search ..." autocomplete="off" />
        </label>

        <div class="table-head" id="productTableHead" aria-hidden="true">
          <span>Product</span>
          <span>Installed</span>
          <span>Latest</span>
          <span class="beta-column">Beta</span>
        </div>

        <div id="productList" class="product-list"></div>
      </section>

      <section class="detail-pane" aria-label="Détail produit">
        <div class="detail-art">
          <div class="detail-logo" id="detailLogo">CP</div>
          <div class="detail-plus">+</div>
          <div class="host-badge" id="detailHost">Pr</div>
        </div>

        <div class="detail-actions">
          <button id="primaryAction" class="primary-action" type="button" disabled>Installer</button>
          <button id="uninstallAction" class="danger-action" type="button" disabled>Uninstall</button>
          <button id="betaAction" class="beta-action" type="button" hidden disabled>Beta</button>
        </div>

        <div class="version-row">
          <span id="detailName">Cyril Plugin Manager</span>
          <strong id="detailVersion">-</strong>
        </div>

        <div class="section-tabs">
          <button class="section-tab active" type="button" data-detail-tab="compatibility">Compatibility</button>
          <button class="section-tab" type="button" data-detail-tab="status">Status / Logs</button>
        </div>

        <div class="detail-tab-panel compatibility" id="compatibilityPanel">
          <span class="app-chip" id="detailKind">CEP</span>
          <span id="detailCompatibility">Premiere Pro</span>
        </div>

        <div class="detail-tab-panel status-card" id="statusPanel" hidden>
          <div class="status-line">
            <span>Installed</span>
            <strong id="installedState">Unknown</strong>
          </div>
          <div class="status-line">
            <span>Asset</span>
            <strong id="assetState">-</strong>
          </div>
          <div class="status-line admin-only" id="betaLine" hidden>
            <span>Beta</span>
            <strong id="betaState">-</strong>
          </div>
          <div class="status-message" id="statusMessage">Ready.</div>
          <div class="log-header">
            <span>Installation logs</span>
            <button id="clearLogsButton" type="button">Clear</button>
          </div>
          <pre class="install-log" id="installLog">No installation logs yet.</pre>
        </div>
      </section>

      <div class="modal-backdrop" id="adminModal" hidden>
        <form class="admin-modal" id="adminForm">
          <div class="modal-title">Admin Mode</div>
          <label class="admin-field">
            <span>Password</span>
            <input id="adminPasswordInput" type="password" autocomplete="current-password" />
          </label>
          <div class="modal-actions">
            <button class="secondary-action" type="button" id="adminCancelButton">Cancel</button>
            <button class="primary-action" type="submit">Unlock</button>
          </div>
        </form>
      </div>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
